<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shaka Clark | Portfolio</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --link: #2563eb;
      --border: #dbe2ea;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 640px;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.8rem;
      line-height: 1.2;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.55;
    }

    a {
      display: inline-block;
      text-decoration: none;
      color: var(--link);
      font-weight: 600;
      border-bottom: 1px solid transparent;
      transition: border-color 120ms ease;
    }

    a:hover {
      border-color: var(--link);
    }

    .note {
      margin-top: 16px;
      font-size: 0.9rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Shaka Clark — Portfolio</h1>
    <p>
      This is a portfolio page linking to projects I’m currently building and iterating on.
      Some work is educational and in active development.
    </p>

    <a href="/digital-navigator">
      Visit the Digital Navigator Tool (DGMD E-57 Section 1)
    </a>

    <p class="note">More projects will be added over time.</p>
  </main>
</body>
</html>
